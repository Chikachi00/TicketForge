name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ticketforge_test
          POSTGRES_USER: ticketforge
          POSTGRES_PASSWORD: ticketforge_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticketforge -d ticketforge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Test backend
        run: ./mvnw verify -Pintegration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  demo-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PowerShell scripts
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path scripts,load-tests/scripts -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
            }
          }

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Inspect k6 scenarios
        working-directory: load-tests
        run: |
          k6 inspect scenarios/smoke.js
          k6 inspect scenarios/order-baseline.js
          k6 inspect scenarios/oversell-spike.js
          k6 inspect scenarios/idempotency-retry.js
          k6 inspect scenarios/payment-callback-replay.js
          k6 inspect scenarios/full-journey.js
