server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ticketforge-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketforge}
    username: ${SPRING_DATASOURCE_USERNAME:ticketforge}
    password: ${SPRING_DATASOURCE_PASSWORD:ticketforge_dev}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: warn

ticketforge:
  orders:
    reservation-ttl: PT5M
    expiration-scan-delay-ms: 10000
  payment:
    callback-secret: ${TICKETFORGE_PAYMENT_CALLBACK_SECRET:ticketforge-local-dev-secret}
